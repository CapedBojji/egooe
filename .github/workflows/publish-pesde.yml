name: Publish to pesde

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pesde CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download \
            --repo pesde-pkg/pesde \
            --pattern 'pesde-*-linux-x86_64.zip' \
            --dir /tmp

          unzip -o /tmp/pesde-*-linux-x86_64.zip -d /tmp/pesde-bin
          install -m 0755 /tmp/pesde-bin/pesde /usr/local/bin/pesde

      - name: Verify pesde CLI
        run: pesde --version

      - name: Authenticate to pesde index
        env:
          PESDE_TOKEN: ${{ secrets.PESDE_TOKEN }}
        run: |
          if [ -z "$PESDE_TOKEN" ]; then
            echo "PESDE_TOKEN is not set. Add it as a repository secret." >&2
            exit 1
          fi
          pesde auth login -t "$PESDE_TOKEN"

      - name: Check if version already published
        id: version_check
        run: |
          LOCAL_VERSION=$(grep '^version' pesde.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Local version: $LOCAL_VERSION"

          PUBLISHED_VERSION=$(pesde package-versions l4ud/egooe 2>/dev/null | grep -oP '^\d+\.\d+\.\d+' | sort -V | tail -1 || echo "none")
          echo "Published version: $PUBLISHED_VERSION"

          if [ "$LOCAL_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "Version $LOCAL_VERSION already published, skipping."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version $LOCAL_VERSION detected, will publish."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.version_check.outputs.should_publish == 'true'
        run: pesde publish -y
