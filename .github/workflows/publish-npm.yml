name: Publish to npm

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm # remove this if you did NOT set environment "npm" in npm trusted publisher

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build --if-present

      - name: Check if version already published
        id: version_check
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")

          echo "Package: $PACKAGE_NAME"
          echo "Local version: $LOCAL_VERSION"

          if npm view "$PACKAGE_NAME@$LOCAL_VERSION" version >/dev/null 2>&1; then
            echo "$PACKAGE_NAME@$LOCAL_VERSION already published, skipping."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "$PACKAGE_NAME@$LOCAL_VERSION not published yet."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm publish --access public