name: Publish to npm

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="${GITHUB_REF_NAME#v}"

          if [ "$TAG_NAME" != "$PACKAGE_VERSION" ]; then
            echo "Tag version v$TAG_NAME does not match package.json version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Check if version already published
        id: version_check
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "none")

          echo "Package: $PACKAGE_NAME"
          echo "Local version: $LOCAL_VERSION"
          echo "Published version: $PUBLISHED_VERSION"

          if [ "$LOCAL_VERSION" = "$PUBLISHED_VERSION" ]; then
            echo "Version $LOCAL_VERSION already published, skipping."
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version $LOCAL_VERSION not published yet."
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.version_check.outputs.should_publish == 'true'
        run: npm publish --access public --provenance
